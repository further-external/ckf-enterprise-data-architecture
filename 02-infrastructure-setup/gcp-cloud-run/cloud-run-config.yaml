# ---------------------------------------------------------
# Catalyst Server-Side GTM Infrastructure Setup
# Target Environment: Google Cloud Run (Fully Managed)
# ---------------------------------------------------------

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ckf-sgtm-multiplexer
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        # High Availability / Autoscaling Rules
        autoscaling.knative.dev/minScale: '3'
        autoscaling.knative.dev/maxScale: '50'
    spec:
      containerConcurrency: 80
      containers:
      - image: gcr.io/cloud-tagmanager/sgtm:latest
        env:
        - name: CONTAINER_CONFIG
          value: "AQAAx_..." # Replaced with actual config string via secret manager
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi